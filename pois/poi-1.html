<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Central Marker</title>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="poi-container">
        <h1>Central Marker</h1>
        <p>You have reached the Central Marker! This is the core of the city. Enjoy the sights and don't forget to unlock this POI on your map.</p>
        
        <button id="unlock-btn" class="btn">Unlock this POI</button>
        <br>
        <a href="../index.html" class="btn" style="background-color: #6b7280;">Back to Map</a>
    </div>

    <script>
        document.getElementById('unlock-btn').addEventListener('click', (e) => {
            const btn = e.target;
            try {
                const state = localStorage.getItem('visitedPOIs');
                let visited = state ? JSON.parse(state) : [];
                
                if (!visited.includes('poi-1')) {
                    visited.push('poi-1');
                    localStorage.setItem('visitedPOIs', JSON.stringify(visited));
                    alert('POI Unlocked!');
                    btn.textContent = 'Unlocked!';
                    btn.classList.add('btn-success');
                } else {
                    alert('You have already unlocked this POI!');
                }
            } catch (err) {
                console.error("Storage error:", err);
            }
        });

        // Initialize button state if already unlocked
        window.addEventListener('load', () => {
            const state = localStorage.getItem('visitedPOIs');
            let visited = state ? JSON.parse(state) : [];
            if (visited.includes('poi-1')) {
                const btn = document.getElementById('unlock-btn');
                btn.textContent = 'Unlocked!';
                btn.classList.add('btn-success');
            }
        });
    </script>
</body>
</html>
